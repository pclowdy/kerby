syntax = "proto3";
package order;
option go_package = "k8s-microservices-app/proto/order";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrders(GetOrdersRequest) returns (GetOrdersResponse);
}

message CreateOrderRequest {
  string user_id = 1;
  string product_id = 2;
  int32 quantity = 3;
}

message CreateOrderResponse {
  string order_id = 1;
  bool success = 2;
  string error = 3;
}

message GetOrdersRequest {
  string user_id = 1;
}

message OrderItem {
  string order_id = 1;
  string product_id = 2;
  int32 quantity = 3;
  string status = 4;
}

message GetOrdersResponse {
  repeated OrderItem orders = 1;
}
