# ==========================================
# AUTH SERVICE
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth
spec:
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
  selector:
    app: auth
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: gcr.io/local-dev/auth-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        env:
        - name: REDIS_HOST
          value: "redis:6379"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5

